automation:
  - id: heatcon_schedule_push_helper_to_time_entity
    alias: HeatCon schedule - push helper to time entity
    description: >-
      When a HeatCon input_datetime helper changes, write its time to the
      matching HeatCon time entity (which snaps it to the controller grid).
    mode: parallel
    max: 60
    variables:
      val: "{{ trigger.to_state.state }}"
      target: >-
        {{ trigger.entity_id
           | replace('input_datetime.heatcon_dhw_', 'time.berging_intergas_xceed_domestic_hot_water_')
           | replace('input_datetime.heatcon_room_1_', 'time.berging_intergas_xceed_room_1_') }}
    triggers:
      - trigger: state
        entity_id:
          - input_datetime.heatcon_dhw_monday_comfort_start
          - input_datetime.heatcon_dhw_monday_comfort_end
          - input_datetime.heatcon_dhw_tuesday_comfort_start
          - input_datetime.heatcon_dhw_tuesday_comfort_end
          - input_datetime.heatcon_dhw_wednesday_comfort_start
          - input_datetime.heatcon_dhw_wednesday_comfort_end
          - input_datetime.heatcon_dhw_thursday_comfort_start
          - input_datetime.heatcon_dhw_thursday_comfort_end
          - input_datetime.heatcon_dhw_friday_comfort_start
          - input_datetime.heatcon_dhw_friday_comfort_end
          - input_datetime.heatcon_dhw_saturday_comfort_start
          - input_datetime.heatcon_dhw_saturday_comfort_end
          - input_datetime.heatcon_dhw_sunday_comfort_start
          - input_datetime.heatcon_dhw_sunday_comfort_end
          - input_datetime.heatcon_room_1_monday_day_start
          - input_datetime.heatcon_room_1_monday_night_start
          - input_datetime.heatcon_room_1_tuesday_day_start
          - input_datetime.heatcon_room_1_tuesday_night_start
          - input_datetime.heatcon_room_1_wednesday_day_start
          - input_datetime.heatcon_room_1_wednesday_night_start
          - input_datetime.heatcon_room_1_thursday_day_start
          - input_datetime.heatcon_room_1_thursday_night_start
          - input_datetime.heatcon_room_1_friday_day_start
          - input_datetime.heatcon_room_1_friday_night_start
          - input_datetime.heatcon_room_1_saturday_day_start
          - input_datetime.heatcon_room_1_saturday_night_start
          - input_datetime.heatcon_room_1_sunday_day_start
          - input_datetime.heatcon_room_1_sunday_night_start
    conditions:
      - condition: template
        value_template: >-
          {{ val not in ['unknown', 'unavailable']
             and not is_state(target, 'unavailable')
             and states(target) != val }}
    actions:
      - action: time.set_value
        target:
          entity_id: "{{ target }}"
        data:
          time: "{{ val }}"
  - id: heatcon_schedule_pull_time_entity_to_helper
    alias: HeatCon schedule - pull time entity to helper
    description: >-
      When a HeatCon time entity changes (e.g. after a poll or external
      change), update the matching input_datetime helper so it always
      reflects the controller value.
    mode: parallel
    max: 60
    variables:
      val: "{{ trigger.to_state.state }}"
      target: >-
        {{ trigger.entity_id
           | replace('time.berging_intergas_xceed_domestic_hot_water_', 'input_datetime.heatcon_dhw_')
           | replace('time.berging_intergas_xceed_room_1_', 'input_datetime.heatcon_room_1_') }}
    triggers:
      - trigger: state
        entity_id:
          - time.berging_intergas_xceed_domestic_hot_water_monday_comfort_start
          - time.berging_intergas_xceed_domestic_hot_water_monday_comfort_end
          - time.berging_intergas_xceed_domestic_hot_water_tuesday_comfort_start
          - time.berging_intergas_xceed_domestic_hot_water_tuesday_comfort_end
          - time.berging_intergas_xceed_domestic_hot_water_wednesday_comfort_start
          - time.berging_intergas_xceed_domestic_hot_water_wednesday_comfort_end
          - time.berging_intergas_xceed_domestic_hot_water_thursday_comfort_start
          - time.berging_intergas_xceed_domestic_hot_water_thursday_comfort_end
          - time.berging_intergas_xceed_domestic_hot_water_friday_comfort_start
          - time.berging_intergas_xceed_domestic_hot_water_friday_comfort_end
          - time.berging_intergas_xceed_domestic_hot_water_saturday_comfort_start
          - time.berging_intergas_xceed_domestic_hot_water_saturday_comfort_end
          - time.berging_intergas_xceed_domestic_hot_water_sunday_comfort_start
          - time.berging_intergas_xceed_domestic_hot_water_sunday_comfort_end
          - time.berging_intergas_xceed_room_1_monday_day_start
          - time.berging_intergas_xceed_room_1_monday_night_start
          - time.berging_intergas_xceed_room_1_tuesday_day_start
          - time.berging_intergas_xceed_room_1_tuesday_night_start
          - time.berging_intergas_xceed_room_1_wednesday_day_start
          - time.berging_intergas_xceed_room_1_wednesday_night_start
          - time.berging_intergas_xceed_room_1_thursday_day_start
          - time.berging_intergas_xceed_room_1_thursday_night_start
          - time.berging_intergas_xceed_room_1_friday_day_start
          - time.berging_intergas_xceed_room_1_friday_night_start
          - time.berging_intergas_xceed_room_1_saturday_day_start
          - time.berging_intergas_xceed_room_1_saturday_night_start
          - time.berging_intergas_xceed_room_1_sunday_day_start
          - time.berging_intergas_xceed_room_1_sunday_night_start
    conditions:
      - condition: template
        value_template: >-
          {{ val not in ['unknown', 'unavailable']
             and states(target) != val }}
    actions:
      - action: input_datetime.set_datetime
        target:
          entity_id: "{{ target }}"
        data:
          time: "{{ val }}"
