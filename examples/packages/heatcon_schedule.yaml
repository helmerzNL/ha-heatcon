# HeatCon schedule helpers - reproducible example config (option 2)
#
# This package recreates the 28 `input_datetime` time helpers and the two
# sync automations that keep them in two-way sync with the integration's
# native `time.*` schedule entities. The helpers are dashboard-friendly
# time pickers; the integration's own `time.*` entities remain the source
# of truth and snap every value to the controller grid (DHW = 10 minutes,
# room = whole hour).
#
# HOW TO USE
#   1. Enable packages once in configuration.yaml:
#        homeassistant:
#          packages: !include_dir_named packages
#   2. Copy this file to <config>/packages/heatcon_schedule.yaml
#   3. Check configuration and restart Home Assistant.
#
# IMPORTANT - adjust the entity prefixes to YOUR install
#   The `time.*` entity ids below are derived from the device name and room
#   name. On this reference install they are:
#       time.berging_intergas_xceed_domestic_hot_water_<weekday>_comfort_start|end
#       time.berging_intergas_xceed_room_1_<weekday>_day_start|night_start
#   If your device/room slug differs, find & replace these two prefixes
#   throughout this file (they appear in the trigger lists and in the
#   `target` variable of each automation):
#       time.berging_intergas_xceed_domestic_hot_water_
#       time.berging_intergas_xceed_room_1_
#   Tip: Developer Tools -> States, filter on `time.` to find your ids.

